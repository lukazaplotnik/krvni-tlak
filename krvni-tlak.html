<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4A90D9">
    <title>BostAI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #4A90D9;
    --primary-dark: #357ABD;
    --green: #27AE60;
    --yellow: #F39C12;
    --orange: #E67E22;
    --red: #E74C3C;
    --bg: #F5F6FA;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --text2: #6B7280;
    --border: #E5E7EB;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top);
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
    background: none;
    border-top: none; border-left: none; border-right: none;
}

.tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
}

.page { flex: 1; overflow-y: scroll; padding: 12px 16px; -webkit-overflow-scrolling: touch; display: none; }
.page.active { display: block; }

/* ENTRY */
.entry-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 14px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
}

.measurement-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-bottom: 10px;
    table-layout: fixed;
}

.measurement-table th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 0 4px 4px;
    text-align: center;
}

.measurement-table th:first-child {
    width: 30px;
    text-align: center;
}

.measurement-table td {
    padding: 2px 4px;
    text-align: center;
}

.measurement-table td:first-child {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    width: 30px;
}

.measurement-table input {
    width: 100%;
    padding: 8px 4px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
}

.measurement-table input::-webkit-inner-spin-button,
.measurement-table input::-webkit-outer-spin-button { -webkit-appearance: none; }
.measurement-table input::placeholder { color: #D0D5DD; font-weight: 500; }
.measurement-table input:focus { border-color: var(--primary); }

.avg-row td {
    padding-top: 14px !important;
}

tbody tr:nth-child(3) td {
    padding-bottom: 6px !important;
}

.avg-row .avg-display {
    font-size: 24px;
    font-weight: 800;
    color: var(--primary);
    padding: 10px 4px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(74,144,217,0.06);
    border-radius: 10px;
}

.avg-row .avg-display.empty {
    color: #D0D5DD;
    font-size: 16px;
    font-weight: 500;
    background: none;
}

.avg-row td:first-child {
    font-size: 16px !important;
    font-weight: 700 !important;
    color: var(--primary) !important;
}

.save-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.save-btn:hover { background: var(--primary-dark); }
.save-btn:active { transform: scale(0.98); }
.save-btn.saved { background: var(--green); pointer-events: none; }
.save-btn:disabled { background: var(--border); color: var(--text2); pointer-events: none; }

.feedback { text-align: center; margin-top: 12px; font-size: 14px; font-weight: 500; min-height: 20px; }
.feedback.good { color: var(--green); }
.feedback.caution { color: var(--yellow); }
.feedback.warning { color: var(--orange); }
.feedback.danger { color: var(--red); }

/* HISTORY */
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px; }
.history-header h2 { font-size: 15px; color: var(--text2); }

.export-btn {
    background: none;
    border: none;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    color: #B0B7C3;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.export-btn:hover, .export-btn:active {
    color: var(--primary);
}

.history-item {
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
}

.history-item .item-content {
    padding: 12px 12px 12px 16px;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
    background: var(--card);
}

.history-item .left { display: flex; flex-direction: column; gap: 2px; }
.history-item .values { font-size: 20px; font-weight: 700; }
.history-item .pulse-val { font-size: 13px; color: var(--text2); font-weight: 400; }
.history-item .time { font-size: 12px; color: var(--text2); min-width: 70px; text-align: right; }

.history-item .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    width: 90px;
    text-align: center;
}

.badge.optimal { background: #C2E0C6; color: #1A5C2A; }
.badge.normal { background: #D4EDDA; color: #155724; }
.badge.high-normal { background: #E0F0D0; color: #4A7A2A; }
.badge.grade1 { background: #FFF3CD; color: #856404; }
.badge.grade2 { background: #FFE0CC; color: #CC4400; }
.badge.grade3 { background: #F8D7DA; color: #721C24; }
.badge.crisis { background: #E74C3C; color: white; }

.delete-btn {
    background: none;
    border: none;
    color: #C9CED6;
    font-size: 14px;
    cursor: pointer;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
}

.delete-btn:hover, .delete-btn:active { background: #FEE2E2; color: var(--red); }
.history-item.confirm-delete .item-content { opacity: 0.3; }

.history-item .confirm-bar {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 2;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.95);
}

.history-item.confirm-delete .confirm-bar { display: flex; }
.confirm-bar span { font-size: 13px; color: #B0B7C3; }

.confirm-bar button {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
}

.confirm-bar .confirm-yes { background: none; border: 1px solid #E8918A; color: #E8918A; }
.confirm-bar .confirm-yes:active { background: #FEE2E2; transform: scale(0.95); }
.confirm-bar .confirm-no { background: none; border: 1px solid var(--border); color: #B0B7C3; }
.confirm-bar .confirm-no:active { background: var(--bg); transform: scale(0.95); }

.empty-msg { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 14px; }

.show-more-btn {
    width: 100%;
    padding: 12px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.2s;
}

.show-more-btn:hover, .show-more-btn:active {
    border-color: var(--primary);
    color: var(--primary);
}

/* DASHBOARD */
.avg-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
}

.avg-bar .avg-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, #FCEAE9, #F5D5D3);
    color: #D04A42;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}

.avg-bar .avg-details { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.avg-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.avg-value { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.avg-value .avg-pulse { font-size: 14px; font-weight: 500; color: var(--text2); margin-left: 4px; }

.avg-meta { font-size: 12px; color: #B0B7C3; font-weight: 400; }

.chart-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
}

.chart-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text); }
.chart-card .chart-wrap { position: relative; width: 100%; height: 260px; }
.chart-card .chart-wrap canvas { position: absolute; inset: 0; }
.chart-card.square { display: flex; flex-direction: column; }
.chart-card.square canvas { align-self: center; }
.chart-card.square canvas { height: auto !important; max-width: 320px; aspect-ratio: 1; }

.variability-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
}

.var-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 0;
    background: var(--bg);
    border-radius: 8px;
}

.var-label {
    font-size: 11px;
    color: #C0C5CC;
    font-weight: 400;
}

.var-val {
    font-size: 13px;
    font-weight: 600;
    color: #A0A8B4;
}

.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }

.filter-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="showTab('entry')">Vnos</button>
        <button class="tab" onclick="showTab('dashboard')">Pregled</button>
    </div>

    <!-- ENTRY PAGE -->
    <div class="page active" id="pageEntry">
        <div class="entry-section">
            <table class="measurement-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Sistolicni</th>
                        <th>Diastolicni</th>
                        <th>Pulz</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1.</td>
                        <td><input type="number" id="s1" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="d1" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="p1" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                    </tr>
                    <tr>
                        <td>2.</td>
                        <td><input type="number" id="s2" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="d2" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="p2" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                    </tr>
                    <tr>
                        <td>3.</td>
                        <td><input type="number" id="s3" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="d3" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                        <td><input type="number" id="p3" placeholder="&#8212;" inputmode="numeric" oninput="onMeasInput(this)"></td>
                    </tr>
                    <tr class="avg-row">
                        <td>&#8709;</td>
                        <td><div class="avg-display empty" id="avgS">&#8212;</div></td>
                        <td><div class="avg-display empty" id="avgD">&#8212;</div></td>
                        <td><div class="avg-display empty" id="avgP">&#8212;</div></td>
                    </tr>
                </tbody>
            </table>
            <button class="save-btn" id="saveBtn" onclick="saveEntry()" disabled>Shrani povprecje</button>
            <div class="feedback" id="feedback"></div>
        </div>
        <div class="history-section">
            <div class="history-header">
                <h2>Zadnje meritve</h2>
                <button class="export-btn" onclick="exportExcel()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="page" id="pageDashboard">
        <div class="filter-bar">
            <button class="filter-btn" data-days="7" onclick="setFilter(7)">7 dni</button>
            <button class="filter-btn active" data-days="30" onclick="setFilter(30)">30 dni</button>
            <button class="filter-btn" data-days="90" onclick="setFilter(90)">90 dni</button>
            <button class="filter-btn" data-days="0" onclick="setFilter(0)">Vse</button>
        </div>
        <div id="content"></div>
    </div>

<script>
// ===== STORE =====
const Store = {
    _get(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } },
    _set(key, data) { localStorage.setItem(key, JSON.stringify(data)); },

    saveReading(systolic, diastolic, pulse) {
        const readings = this._get('readings');
        readings.push({ systolic, diastolic, pulse: pulse || null, measured_at: new Date().toISOString() });
        this._set('readings', readings);
    },
    getReadings(days) {
        const readings = this._get('readings');
        if (!days) return readings;
        const since = new Date(); since.setDate(since.getDate() - days);
        return readings.filter(r => new Date(r.measured_at) >= since);
    },
    getLastReadings(count) { return this._get('readings').slice(-count); },
    deleteReading(index) {
        const readings = this._get('readings');
        readings.splice(index, 1);
        this._set('readings', readings);
    },
    getStats(days) {
        const readings = days ? this.getReadings(days) : this.getReadings();
        if (!readings.length) return { count: 0 };
        const sum = (arr, fn) => arr.reduce((a, r) => a + fn(r), 0);
        const pr = readings.filter(r => r.pulse);
        return {
            count: readings.length,
            avg_systolic: sum(readings, r => r.systolic) / readings.length,
            avg_diastolic: sum(readings, r => r.diastolic) / readings.length,
            avg_pulse: pr.length ? sum(pr, r => r.pulse) / pr.length : null,
        };
    }
};

// Global Chart.js defaults for mobile readability
Chart.defaults.font.size = 13;
Chart.defaults.plugins.tooltip.titleFont = { size: 14, weight: '600' };
Chart.defaults.plugins.tooltip.bodyFont = { size: 13 };
Chart.defaults.plugins.tooltip.padding = 10;
Chart.defaults.plugins.tooltip.boxPadding = 4;
Chart.defaults.plugins.legend.labels.font = { size: 13 };
Chart.defaults.plugins.legend.labels.padding = 16;
ChartDataLabels.defaults.display = false;
Chart.register(ChartDataLabels);

const barDatalabels = {
    display: (ctx) => ctx.dataset.data[ctx.dataIndex] > 0,
    anchor: 'end',
    align: 'end',
    font: { size: 10, weight: '600' },
    color: '#9CA3AF',
    offset: -2,
};

// ===== TABS =====
function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'entry' && i === 0) || (tab === 'dashboard' && i === 1));
    });
    document.getElementById('pageEntry').classList.toggle('active', tab === 'entry');
    document.getElementById('pageDashboard').classList.toggle('active', tab === 'dashboard');
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'entry') renderHistory();
}

// ===== BP CLASSIFICATION (ESC/ESH Guidelines used in Slovenia) =====
// Source: Evropske smernice za hipertenzijo (ESC/ESH 2018), used by Slovenian cardiology society
function classifyBP(s, d) {
    if (s >= 180 || d >= 110) return { label: 'Stopnja 3', cls: 'crisis' };
    if (s >= 160 || d >= 100) return { label: 'Stopnja 2', cls: 'grade2' };
    if (s >= 140 || d >= 90)  return { label: 'Stopnja 1', cls: 'grade1' };
    if (s >= 130 || d >= 85)  return { label: 'Visoko norm.', cls: 'high-normal' };
    if (s >= 120 || d >= 80)  return { label: 'Normalen', cls: 'normal' };
    return { label: 'Optimalen', cls: 'optimal' };
}

// ===== ENTRY (3 measurements → average) =====
function getVal(id) { const v = parseInt(document.getElementById(id).value); return isNaN(v) ? null : v; }

function computeAvg() {
    const vals = [1,2,3].map(i => ({
        s: getVal('s'+i), d: getVal('d'+i), p: getVal('p'+i)
    }));

    const filled = vals.filter(v => v.s && v.d);
    const avgS = document.getElementById('avgS');
    const avgD = document.getElementById('avgD');
    const avgP = document.getElementById('avgP');
    const btn = document.getElementById('saveBtn');

    if (filled.length === 0) {
        avgS.textContent = '\u2014'; avgS.className = 'avg-display empty';
        avgD.textContent = '\u2014'; avgD.className = 'avg-display empty';
        avgP.textContent = '\u2014'; avgP.className = 'avg-display empty';
        btn.disabled = true;
        return null;
    }

    const s = Math.round(filled.reduce((a, v) => a + v.s, 0) / filled.length);
    const d = Math.round(filled.reduce((a, v) => a + v.d, 0) / filled.length);
    const pVals = filled.filter(v => v.p);
    const p = pVals.length ? Math.round(pVals.reduce((a, v) => a + v.p, 0) / pVals.length) : null;

    avgS.textContent = s; avgS.className = 'avg-display';
    avgD.textContent = d; avgD.className = 'avg-display';
    avgP.textContent = p || '\u2014'; avgP.className = p ? 'avg-display' : 'avg-display empty';
    btn.disabled = false;

    return { s, d, p };
}

function onMeasInput(el) {
    // Auto-tab on 3 digits
    if (el.value.length >= 3) {
        const inputs = [...document.querySelectorAll('.measurement-table input')];
        const idx = inputs.indexOf(el);
        if (idx < inputs.length - 1) inputs[idx + 1].focus();
    }
    computeAvg();
}

function saveEntry() {
    const avg = computeAvg();
    if (!avg) return;
    const fb = document.getElementById('feedback');
    const btn = document.getElementById('saveBtn');

    if (avg.s < 60 || avg.s > 250) { fb.textContent = 'Sistolicni: 60\u2013250'; fb.className = 'feedback warning'; return; }
    if (avg.d < 30 || avg.d > 150) { fb.textContent = 'Diastolicni: 30\u2013150'; fb.className = 'feedback warning'; return; }

    Store.saveReading(avg.s, avg.d, avg.p);
    const bp = classifyBP(avg.s, avg.d);
    fb.textContent = bp.label;
    fb.className = 'feedback ' + bp.cls.replace('crisis','danger').replace('grade2','danger').replace('grade1','warning').replace('high-normal','caution').replace('normal','good').replace('optimal','good');
    btn.textContent = 'Shranjeno!';
    btn.classList.add('saved');

    setTimeout(() => {
        btn.textContent = 'Shrani povprecje';
        btn.classList.remove('saved');
        btn.disabled = true;
        document.querySelectorAll('.measurement-table input').forEach(i => i.value = '');
        document.getElementById('avgS').textContent = '\u2014'; document.getElementById('avgS').className = 'avg-display empty';
        document.getElementById('avgD').textContent = '\u2014'; document.getElementById('avgD').className = 'avg-display empty';
        document.getElementById('avgP').textContent = '\u2014'; document.getElementById('avgP').className = 'avg-display empty';
        fb.textContent = ''; fb.className = 'feedback';
    }, 1500);
    renderHistory();
}

// Enter key saves
document.querySelectorAll('.measurement-table input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveEntry(); });
});

// ===== HISTORY =====
function askDelete(index, el) {
    document.querySelectorAll('.history-item.confirm-delete').forEach(item => item.classList.remove('confirm-delete'));
    el.closest('.history-item').classList.add('confirm-delete');
}

function cancelDelete(el) { el.closest('.history-item').classList.remove('confirm-delete'); }

function confirmDelete(index) { Store.deleteReading(index); renderHistory(); }

let showAll = false;

function renderHistory() {
    const list = document.getElementById('historyList');
    const allReadings = Store.getReadings();
    if (!allReadings.length) { list.innerHTML = '<div class="empty-msg">Se ni meritev</div>'; return; }

    const display = showAll ? allReadings : allReadings.slice(-5);
    const items = display.slice().reverse().map((r, i) => {
        const actualIdx = showAll ? (allReadings.length - 1 - i) : (allReadings.length - display.length + (display.length - 1 - i));
        const bp = classifyBP(r.systolic, r.diastolic);
        const date = new Date(r.measured_at);
        const time = date.toLocaleDateString('sl-SI', { day: 'numeric', month: 'short' })
            + ' ' + date.toLocaleTimeString('sl-SI', { hour: '2-digit', minute: '2-digit' });
        const pulse = r.pulse ? `<div class="pulse-val">Pulz: ${r.pulse} u/min</div>` : '';
        return `
            <div class="history-item">
                <div class="item-content">
                    <div class="left">
                        <div class="values">${r.systolic}/${r.diastolic}</div>
                        ${pulse}
                    </div>
                    <span class="badge ${bp.cls}">${bp.label}</span>
                    <div class="time">${time}</div>
                    <button class="delete-btn" onclick="askDelete(${actualIdx}, this)" title="Izbrisi">&times;</button>
                </div>
                <div class="confirm-bar">
                    <span>Izbrisati?</span>
                    <button class="confirm-yes" onclick="confirmDelete(${actualIdx})">Da</button>
                    <button class="confirm-no" onclick="cancelDelete(this)">Ne</button>
                </div>
            </div>`;
    }).join('');

    const moreBtn = (!showAll && allReadings.length > 5)
        ? `<button class="show-more-btn" onclick="showAll=true;renderHistory()">Pokazi vse (${allReadings.length})</button>`
        : (showAll && allReadings.length > 5)
        ? `<button class="show-more-btn" onclick="showAll=false;renderHistory()">Pokazi manj</button>`
        : '';

    list.innerHTML = items + moreBtn;
}

// ===== EXPORT TO EXCEL (CSV) =====
function exportExcel() {
    const readings = Store.getReadings();
    if (!readings.length) { alert('Ni meritev za izvoz.'); return; }

    const BOM = '\uFEFF';
    const header = 'Datum;Cas;Sistolicni;Diastolicni;Pulz;Ocena\n';
    const rows = readings.map(r => {
        const d = new Date(r.measured_at);
        const date = d.toLocaleDateString('sl-SI');
        const time = d.toLocaleTimeString('sl-SI', { hour: '2-digit', minute: '2-digit' });
        const bp = classifyBP(r.systolic, r.diastolic);
        return `${date};${time};${r.systolic};${r.diastolic};${r.pulse || ''};${bp.label}`;
    }).join('\n');

    const blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'krvni-tlak-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
}

// ===== DASHBOARD =====
let currentDays = 30;
const charts = {};

function destroyCharts() {
    Object.values(charts).forEach(c => c && c.destroy());
    Object.keys(charts).forEach(k => delete charts[k]);
}

const timeScale = {
    type: 'time',
    time: { tooltipFormat: 'd. MMM, HH:mm', unit: 'day', displayFormats: { day: 'd. MMM', week: 'd. MMM', month: 'MMM yyyy' } },
    grid: { color: 'rgba(0,0,0,0.03)' }, ticks: { maxTicksLimit: 8, autoSkip: false, font: { size: 10 } }
};

function loadDashboard() {
    const content = document.getElementById('content');
    const days = currentDays || null;
    const readings = Store.getReadings(days);
    const stats = Store.getStats(days);

    destroyCharts();

    if (!readings.length) {
        content.innerHTML = '<div class="empty-msg">Se ni meritev za prikaz.<br>Pojdite na Vnos in vnesite meritev.</div>';
        return;
    }

    const periodLabel = currentDays > 0 ? `${currentDays} dni` : 'vse';
    const pulseAvg = stats.avg_pulse ? `<span class="avg-pulse">\u00b7 ${Math.round(stats.avg_pulse)} u/min</span>` : '';

    content.innerHTML = `
        <div class="avg-bar">
            <div class="avg-icon">\u2665</div>
            <div class="avg-details">
                <span class="avg-label">Povprecje (${periodLabel})</span>
                <span class="avg-value">${Math.round(stats.avg_systolic)}/${Math.round(stats.avg_diastolic)} ${pulseAvg}</span>
                <span class="avg-meta">${stats.count} meritev</span>
            </div>
        </div>
        <div class="chart-card">
            <h3>Krvni tlak in pulz</h3>
            <div class="chart-wrap"><canvas id="bpChart"></canvas></div>
        </div>
        <div class="chart-card square">
            <h3>Porazdelitev po conah</h3>
            <canvas id="zonesChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Povprecje: jutro vs. vecer</h3>
            <div class="chart-wrap"><canvas id="morningEveningChart"></canvas></div>
            <div class="variability-row" id="variabilityRow"></div>
        </div>
        <div class="chart-card">
            <h3>Povprecje po dnevih v tednu</h3>
            <div class="chart-wrap"><canvas id="weekdayChart"></canvas></div>
        </div>
    `;

    renderBPChart(readings);
    renderZonesChart(readings);
    renderMorningEveningChart(readings);
    renderWeekdayChart(readings);
}

// 1. Combined BP + Pulse chart
function renderBPChart(readings) {
    const ctx = document.getElementById('bpChart');
    if (!ctx) return;
    const pr = readings.length > 30 ? 0 : 1.5;
    const datasets = [
        {
            label: 'Sistolicni',
            data: readings.map(r => ({ x: new Date(r.measured_at), y: r.systolic })),
            borderColor: '#2C5F8A', backgroundColor: 'rgba(44,95,138,0.06)',
            fill: true, cubicInterpolationMode: 'monotone', pointRadius: pr, pointBackgroundColor: '#2C5F8A',
            borderWidth: 2, yAxisID: 'y', pointHitRadius: 8,
        },
        {
            label: 'Diastolicni',
            data: readings.map(r => ({ x: new Date(r.measured_at), y: r.diastolic })),
            borderColor: '#85B8E0', backgroundColor: 'rgba(133,184,224,0.06)',
            fill: true, cubicInterpolationMode: 'monotone', pointRadius: pr, pointBackgroundColor: '#85B8E0',
            borderWidth: 2, yAxisID: 'y', pointHitRadius: 8,
        }
    ];
    if (readings.some(r => r.pulse)) {
        datasets.push({
            label: 'Pulz',
            data: readings.filter(r => r.pulse).map(r => ({ x: new Date(r.measured_at), y: r.pulse })),
            borderColor: 'rgba(150,120,200,0.45)', backgroundColor: 'transparent',
            fill: false, cubicInterpolationMode: 'monotone', pointRadius: 0, pointBackgroundColor: 'rgba(150,120,200,0.45)', pointHitRadius: 8,
            borderWidth: 1.5,
            yAxisID: 'y',
        });
    }
    charts.bp = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'line' } } },
            scales: {
                y: { beginAtZero: false, min: 40, max: 200, grid: { color: 'rgba(0,0,0,0.05)' } },
                x: { ...timeScale }
            }
        }
    });
}

// 2. Morning vs Evening — bar chart comparing avg, range, variability
function renderMorningEveningChart(readings) {
    const ctx = document.getElementById('morningEveningChart');
    if (!ctx) return;

    const morning = { sys: [], dia: [] };
    const evening = { sys: [], dia: [] };
    readings.forEach(r => {
        const h = new Date(r.measured_at).getHours();
        const bucket = h < 12 ? morning : evening;
        bucket.sys.push(r.systolic);
        bucket.dia.push(r.diastolic);
    });

    const avg = arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
    const std = arr => {
        if (arr.length < 2) return 0;
        const m = avg(arr);
        return Math.round(Math.sqrt(arr.reduce((a, v) => a + (v - m) ** 2, 0) / arr.length));
    };

    const labels = ['Jutro', 'Vecer'];
    const sysAvgs = [avg(morning.sys), avg(evening.sys)];
    const diaAvgs = [avg(morning.dia), avg(evening.dia)];
    const sysStds = [std(morning.sys), std(evening.sys)];
    const diaStds = [std(morning.dia), std(evening.dia)];

    charts.morningEvening = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                {
                    label: 'Sistolicni',
                    data: sysAvgs,
                    backgroundColor: 'rgba(44,95,138,0.7)',
                    borderRadius: 6,
                },
                {
                    label: 'Diastolicni',
                    data: diaAvgs,
                    backgroundColor: 'rgba(133,184,224,0.7)',
                    borderRadius: 6,
                }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' }, datalabels: barDatalabels },
            layout: { padding: { top: 20 } },
            scales: {
                y: { beginAtZero: false, min: 40, max: 160, grid: { color: 'rgba(0,0,0,0.05)' } },
                x: { grid: { display: false } }
            }
        }
    });

    // Variability text below chart
    const row = document.getElementById('variabilityRow');
    if (row) {
        row.innerHTML = `
            <div class="var-item">
                <span class="var-label">Variabilnost jutro</span>
                <span class="var-val">&plusmn;${sysStds[0]}/${diaStds[0]} mmHg</span>
            </div>
            <div class="var-item">
                <span class="var-label">Variabilnost vecer</span>
                <span class="var-val">&plusmn;${sysStds[1]}/${diaStds[1]} mmHg</span>
            </div>
        `;
    }
}

// 3. Variability — rolling standard deviation over window of 5 readings
function renderVariabilityChart(readings) {
    const ctx = document.getElementById('variabilityChart');
    if (!ctx) return;

    const window = 5;
    const data = [];
    for (let i = window - 1; i < readings.length; i++) {
        const slice = readings.slice(i - window + 1, i + 1).map(r => r.systolic);
        const mean = slice.reduce((a, b) => a + b, 0) / slice.length;
        const variance = slice.reduce((a, v) => a + (v - mean) ** 2, 0) / slice.length;
        data.push({ x: new Date(readings[i].measured_at), y: Math.round(Math.sqrt(variance) * 10) / 10 });
    }

    charts.variability = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Std. odklon (zadnjih 5)',
                data,
                borderColor: '#E67E22', backgroundColor: 'rgba(230,126,34,0.08)',
                fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#E67E22',
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } },
            scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' },
                    title: { display: true, text: 'mmHg', font: { size: 11 }, color: '#6B7280' } },
                x: { ...timeScale }
            }
        }
    });
}

// 4. Zone distribution (doughnut)
function renderZonesChart(readings) {
    const ctx = document.getElementById('zonesChart');
    if (!ctx) return;

    const zones = { 'Optimalen': 0, 'Normalen': 0, 'Visoko norm.': 0, 'Stopnja 1': 0, 'Stopnja 2': 0, 'Stopnja 3': 0 };
    readings.forEach(r => {
        const bp = classifyBP(r.systolic, r.diastolic);
        zones[bp.label]++;
    });

    const labels = Object.keys(zones).filter(k => zones[k] > 0);
    const values = labels.map(k => zones[k]);
    const colors = {
        'Optimalen': '#7BBF8A', 'Normalen': '#A0D4AA', 'Visoko norm.': '#D4E8B0',
        'Stopnja 1': '#F5D98A', 'Stopnja 2': '#E8B47A', 'Stopnja 3': '#D4909A'
    };

    charts.zones = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => colors[l]),
                borderWidth: 2, borderColor: '#fff',
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: true,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 14, boxWidth: 14 } },
                tooltip: {
                    callbacks: {
                        title: () => '',
                        label: ctx => {
                            const pct = Math.round(ctx.parsed / readings.length * 100);
                            return `${ctx.label}: ${ctx.parsed} (${pct}%)`;
                        }
                    }
                }
            }
        }
    });
}

// 5. Average by weekday
function renderWeekdayChart(readings) {
    const dayNames = ['Ned', 'Pon', 'Tor', 'Sre', 'Cet', 'Pet', 'Sob'];
    const buckets = Array.from({ length: 7 }, () => ({ sys: [], dia: [] }));
    readings.forEach(r => {
        const day = new Date(r.measured_at).getDay();
        buckets[day].sys.push(r.systolic);
        buckets[day].dia.push(r.diastolic);
    });

    const order = [1, 2, 3, 4, 5, 6, 0];
    const labels = order.map(i => dayNames[i]);
    const avg = arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;

    const ctx = document.getElementById('weekdayChart');
    if (ctx) {
        charts.weekday = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Sistolicni',
                        data: order.map(i => avg(buckets[i].sys)),
                        backgroundColor: 'rgba(44,95,138,0.7)',
                        borderRadius: 6,
                    },
                    {
                        label: 'Diastolicni',
                        data: order.map(i => avg(buckets[i].dia)),
                        backgroundColor: 'rgba(133,184,224,0.7)',
                        borderRadius: 6,
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' }, datalabels: barDatalabels },
                layout: { padding: { top: 20 } },
                scales: {
                    y: { beginAtZero: false, min: 40, max: 160, grid: { color: 'rgba(0,0,0,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }
}

function setFilter(days) {
    currentDays = days;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.days) === days);
    });
    loadDashboard();
}

renderHistory();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
